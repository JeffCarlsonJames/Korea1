<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Won Spent</title>
  <meta name="description" content="Track how much you've spent in KRW, converted to USD." />

  <!-- PWA / iOS home-screen app -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Won Spent" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-192.png" />

  <style>
    :root {
      --teal: #0f766e;
      --teal-dark: #0b5d56;
      --bg: #f1f5f9;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --danger: #e11d48;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    .hero {
      background: linear-gradient(160deg, #128c82 0%, var(--teal) 55%, var(--teal-dark) 100%);
      color: #fff;
      padding: calc(var(--safe-top) + 28px) 20px 30px;
      border-radius: 0 0 28px 28px;
      box-shadow: 0 8px 24px rgba(15,118,110,0.25);
    }
    .hero h1 { margin: 0 0 4px; font-size: 15px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; opacity: .85; }
    .total-usd { font-size: 46px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; margin: 2px 0; }
    .total-krw { font-size: 16px; opacity: .9; font-weight: 500; }
    .rate-line { margin-top: 14px; font-size: 13px; opacity: .9; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .rate-line button {
      background: rgba(255,255,255,0.18); color:#fff; border:none; border-radius: 999px;
      padding: 5px 12px; font-size: 12px; font-weight:600; cursor: pointer;
    }
    .rate-line button:active { background: rgba(255,255,255,0.32); }

    .wrap { max-width: 560px; margin: 0 auto; padding: 18px 16px calc(var(--safe-bottom) + 32px); }

    .card { background: var(--card); border-radius: 18px; padding: 16px; box-shadow: 0 2px 10px rgba(15,23,42,0.05); margin-top: -22px; position: relative; }

    label { display:block; font-size: 13px; color: var(--muted); font-weight:600; margin-bottom: 6px; }
    .amount-row { display:flex; gap: 10px; }
    .amount-input {
      flex: 1; position: relative; display:flex; align-items:center;
      border: 2px solid var(--line); border-radius: 14px; padding: 0 14px; background:#fff;
    }
    .amount-input:focus-within { border-color: var(--teal); }
    .amount-input span { font-size: 22px; color: var(--muted); margin-right: 6px; font-weight:700; }
    .amount-input input {
      border: none; outline: none; font-size: 26px; font-weight: 700; width: 100%;
      padding: 14px 0; background: transparent; color: var(--ink); min-width: 0;
    }
    .add-btn {
      background: var(--teal); color:#fff; border:none; border-radius: 14px;
      font-size: 17px; font-weight: 700; padding: 0 22px; cursor: pointer; white-space: nowrap;
    }
    .add-btn:active { background: var(--teal-dark); }
    .add-btn:disabled { opacity: .45; }
    .preview { font-size: 13px; color: var(--muted); margin-top: 10px; min-height: 18px; }
    .preview b { color: var(--teal); }

    .section-head { display:flex; justify-content: space-between; align-items: baseline; margin: 26px 4px 10px; }
    .section-head h2 { font-size: 15px; margin:0; color: var(--ink); }
    .section-head .count { font-size: 13px; color: var(--muted); }

    ul.list { list-style: none; margin: 0; padding: 0; }
    li.item {
      background: var(--card); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px;
      display:flex; align-items:center; gap: 12px; box-shadow: 0 1px 4px rgba(15,23,42,0.04);
    }
    .item .money { flex:1; }
    .item .usd { font-size: 18px; font-weight: 700; }
    .item .krw { font-size: 13px; color: var(--muted); }
    .item .when { font-size: 12px; color: var(--muted); text-align:right; }
    .del {
      background: none; border: none; color: var(--danger); font-size: 13px; font-weight:600;
      cursor: pointer; padding: 6px 8px; border-radius: 8px;
    }
    .del:active { background: #fee2e2; }

    .empty { text-align:center; color: var(--muted); padding: 30px 10px; font-size: 14px; }

    .footer-actions { margin-top: 18px; text-align:center; }
    .clear-btn { background:none; border:none; color: var(--danger); font-size: 13px; font-weight:600; cursor:pointer; }

    /* Rate editor modal */
    .backdrop { position: fixed; inset:0; background: rgba(15,23,42,0.45); display:none; align-items:flex-end; justify-content:center; z-index: 50; }
    .backdrop.show { display:flex; }
    .sheet { background:#fff; width:100%; max-width:560px; border-radius: 20px 20px 0 0; padding: 22px 18px calc(var(--safe-bottom) + 22px); }
    .sheet h3 { margin: 0 0 4px; font-size: 18px; }
    .sheet p { margin: 0 0 16px; font-size: 13px; color: var(--muted); }
    .sheet .amount-input { margin-bottom: 14px; }
    .sheet-btns { display:flex; gap: 10px; }
    .sheet-btns button { flex:1; border:none; border-radius: 14px; padding: 14px; font-size: 16px; font-weight:700; cursor:pointer; }
    .btn-primary { background: var(--teal); color:#fff; }
    .btn-ghost { background: var(--line); color: var(--ink); }
    .toast {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(var(--safe-bottom) + 20px);
      background: #0f172a; color:#fff; padding: 10px 18px; border-radius: 999px; font-size: 14px;
      opacity: 0; transition: opacity .2s; pointer-events:none; z-index: 60;
    }
    .toast.show { opacity: .95; }
  </style>
</head>
<body>
  <header class="hero">
    <h1>Total Spent</h1>
    <div class="total-usd" id="totalUsd">$0.00</div>
    <div class="total-krw" id="totalKrw">₩0</div>
    <div class="rate-line">
      <span id="rateText">1 USD = ₩1,365</span>
      <button id="editRate">Edit</button>
      <button id="refreshRate">↻ Live</button>
    </div>
  </header>

  <main class="wrap">
    <div class="card">
      <label for="krwInput">Add an expense (in Korean Won)</label>
      <div class="amount-row">
        <div class="amount-input">
          <span>₩</span>
          <input id="krwInput" type="text" inputmode="numeric" placeholder="0" autocomplete="off" />
        </div>
        <button class="add-btn" id="addBtn">Add</button>
      </div>
      <div class="preview" id="preview"></div>
    </div>

    <div class="section-head">
      <h2>History</h2>
      <span class="count" id="count"></span>
    </div>
    <ul class="list" id="list"></ul>
    <div class="empty" id="empty">No expenses yet. Add your first one above.</div>

    <div class="footer-actions" id="footerActions" style="display:none">
      <button class="clear-btn" id="clearBtn">Clear all history</button>
    </div>
  </main>

  <!-- Rate editor -->
  <div class="backdrop" id="backdrop">
    <div class="sheet">
      <h3>Exchange rate</h3>
      <p>How many Korean Won equal 1 US Dollar? Tap “↻ Live” on the main screen to auto-fetch the latest rate.</p>
      <label for="rateInput">₩ per $1</label>
      <div class="amount-input">
        <span>₩</span>
        <input id="rateInput" type="text" inputmode="decimal" autocomplete="off" />
      </div>
      <div class="sheet-btns">
        <button class="btn-ghost" id="cancelRate">Cancel</button>
        <button class="btn-primary" id="saveRate">Save</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    (function () {
      'use strict';

      var STORE_KEY = 'wonSpent.v1';
      var DEFAULT_RATE = 1365; // KRW per 1 USD; updated live when online
      var RATE_API = 'https://open.er-api.com/v6/latest/USD';

      // ---- State + persistence ----
      var state = loadState();

      function loadState() {
        try {
          var raw = localStorage.getItem(STORE_KEY);
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && Array.isArray(parsed.expenses)) {
              return {
                expenses: parsed.expenses,
                rate: typeof parsed.rate === 'number' && parsed.rate > 0 ? parsed.rate : DEFAULT_RATE,
                rateUpdated: parsed.rateUpdated || null
              };
            }
          }
        } catch (e) { /* ignore corrupt data, start fresh */ }
        return { expenses: [], rate: DEFAULT_RATE, rateUpdated: null };
      }

      function save() {
        try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
        catch (e) { toast('Could not save — storage full?'); }
      }

      // ---- Helpers ----
      var usdFmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
      var krwFmt = new Intl.NumberFormat('en-US', { maximumFractionDigits: 0 });

      function formatUsd(n) { return usdFmt.format(n || 0); }
      function formatKrw(n) { return '₩' + krwFmt.format(Math.round(n || 0)); }

      function totals() {
        var krw = 0, usd = 0;
        state.expenses.forEach(function (e) { krw += e.krw; usd += e.usd; });
        return { krw: krw, usd: usd };
      }

      function relTime(ts) {
        var d = new Date(ts);
        var now = new Date();
        var sameDay = d.toDateString() === now.toDateString();
        if (sameDay) {
          return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        }
        return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
      }

      // ---- Rendering ----
      var el = {
        totalUsd: document.getElementById('totalUsd'),
        totalKrw: document.getElementById('totalKrw'),
        rateText: document.getElementById('rateText'),
        krwInput: document.getElementById('krwInput'),
        addBtn: document.getElementById('addBtn'),
        preview: document.getElementById('preview'),
        list: document.getElementById('list'),
        empty: document.getElementById('empty'),
        count: document.getElementById('count'),
        footerActions: document.getElementById('footerActions'),
        clearBtn: document.getElementById('clearBtn'),
        backdrop: document.getElementById('backdrop'),
        rateInput: document.getElementById('rateInput'),
        toast: document.getElementById('toast')
      };

      function render() {
        var t = totals();
        el.totalUsd.textContent = formatUsd(t.usd);
        el.totalKrw.textContent = formatKrw(t.krw) + ' spent';
        el.rateText.textContent = '1 USD = ₩' + krwFmt.format(Math.round(state.rate));

        // List (newest first)
        el.list.innerHTML = '';
        var items = state.expenses.slice().reverse();
        items.forEach(function (e) {
          var li = document.createElement('li');
          li.className = 'item';
          var money = document.createElement('div');
          money.className = 'money';
          money.innerHTML = '<div class="usd">' + formatUsd(e.usd) + '</div>' +
                            '<div class="krw">' + formatKrw(e.krw) + '</div>';
          var when = document.createElement('div');
          when.className = 'when';
          when.textContent = relTime(e.ts);
          var del = document.createElement('button');
          del.className = 'del';
          del.textContent = 'Delete';
          del.setAttribute('aria-label', 'Delete expense');
          del.addEventListener('click', function () { removeExpense(e.id); });
          li.appendChild(money);
          li.appendChild(when);
          li.appendChild(del);
          el.list.appendChild(li);
        });

        var has = state.expenses.length > 0;
        el.empty.style.display = has ? 'none' : 'block';
        el.footerActions.style.display = has ? 'block' : 'none';
        el.count.textContent = has ? state.expenses.length + (state.expenses.length === 1 ? ' expense' : ' expenses') : '';
        updatePreview();
      }

      function parseNum(str) {
        if (str == null) return NaN;
        var cleaned = String(str).replace(/[^0-9.]/g, '');
        if (cleaned === '' || cleaned === '.') return NaN;
        return parseFloat(cleaned);
      }

      function updatePreview() {
        var v = parseNum(el.krwInput.value);
        if (isNaN(v) || v <= 0) { el.preview.textContent = ''; el.addBtn.disabled = true; return; }
        el.addBtn.disabled = false;
        var usd = v / state.rate;
        el.preview.innerHTML = formatKrw(v) + ' ≈ <b>' + formatUsd(usd) + '</b>';
      }

      // ---- Actions ----
      function addExpense() {
        var v = parseNum(el.krwInput.value);
        if (isNaN(v) || v <= 0) return;
        var usd = v / state.rate;
        state.expenses.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          krw: v,
          usd: usd,
          rate: state.rate,
          ts: Date.now()
        });
        save();
        el.krwInput.value = '';
        render();
        el.krwInput.focus();
        toast('Added ' + formatUsd(usd));
      }

      function removeExpense(id) {
        state.expenses = state.expenses.filter(function (e) { return e.id !== id; });
        save();
        render();
      }

      function clearAll() {
        if (!state.expenses.length) return;
        if (!confirm('Delete ALL expenses? This cannot be undone.')) return;
        state.expenses = [];
        save();
        render();
        toast('History cleared');
      }

      // ---- Rate editing + live fetch ----
      function openRateEditor() {
        el.rateInput.value = String(Math.round(state.rate));
        el.backdrop.classList.add('show');
        setTimeout(function () { el.rateInput.focus(); el.rateInput.select(); }, 50);
      }
      function closeRateEditor() { el.backdrop.classList.remove('show'); }
      function saveRate() {
        var v = parseNum(el.rateInput.value);
        if (isNaN(v) || v <= 0) { toast('Enter a valid rate'); return; }
        state.rate = v;
        state.rateUpdated = 'manual';
        save();
        closeRateEditor();
        render();
        toast('Rate updated');
      }

      function fetchLiveRate() {
        toast('Fetching latest rate…');
        fetch(RATE_API, { cache: 'no-store' })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var krwPerUsd = data && data.rates && data.rates.KRW;
            if (!krwPerUsd || krwPerUsd <= 0) throw new Error('bad rate');
            state.rate = krwPerUsd;
            state.rateUpdated = Date.now();
            save();
            render();
            toast('Live rate: 1 USD = ₩' + krwFmt.format(Math.round(krwPerUsd)));
          })
          .catch(function () {
            toast('Could not fetch — using saved rate');
          });
      }

      // ---- Toast ----
      var toastTimer = null;
      function toast(msg) {
        el.toast.textContent = msg;
        el.toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { el.toast.classList.remove('show'); }, 1800);
      }

      // ---- Wire up events ----
      el.addBtn.addEventListener('click', addExpense);
      el.krwInput.addEventListener('input', updatePreview);
      el.krwInput.addEventListener('keydown', function (ev) {
        if (ev.key === 'Enter') { ev.preventDefault(); addExpense(); }
      });
      el.clearBtn.addEventListener('click', clearAll);
      document.getElementById('editRate').addEventListener('click', openRateEditor);
      document.getElementById('refreshRate').addEventListener('click', fetchLiveRate);
      document.getElementById('saveRate').addEventListener('click', saveRate);
      document.getElementById('cancelRate').addEventListener('click', closeRateEditor);
      el.backdrop.addEventListener('click', function (ev) { if (ev.target === el.backdrop) closeRateEditor(); });
      el.rateInput.addEventListener('keydown', function (ev) { if (ev.key === 'Enter') saveRate(); });

      render();

      // Try to refresh the rate on first load each session (best effort, silent on failure).
      // Skip if the user has manually set a rate — their explicit choice wins until they tap "↻ Live".
      if (navigator.onLine && state.rateUpdated !== 'manual') {
        fetch(RATE_API, { cache: 'no-store' })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            var krwPerUsd = data && data.rates && data.rates.KRW;
            if (krwPerUsd && krwPerUsd > 0) {
              state.rate = krwPerUsd;
              state.rateUpdated = Date.now();
              save();
              render();
            }
          })
          .catch(function () {});
      }

      // ---- Service worker for offline use ----
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () {});
        });
      }
    })();
  </script>
</body>
</html>
